<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Front-End</title>
    <script src="/Blockchain_Frontend.js" defer></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <h1>Blockchain Front-End</h1>

    <div id="buttonContainer">
        <button id="minerar">Mine Block</button>
        <button id="buscar_cadeia">Get Chain</button>
        <button id="validar_cadeia">Is Valid</button>
        <button id="criar_carteira">Create Wallet</button>
        <button id="inserir_transacao">Add Transaction</button>
    </div>

    <div>
        <input id="hash_carteira_saldo" placeholder="Informe o hash da carteira" type="text">
        <button id="consultar_saldo">Consultar Saldo</button>
    </div>
    <div id="output_saldo"></div>
    
    <div id="output"></div>
</body>
</html>
